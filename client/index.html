<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Default to no-index. App.tsx removes this dynamically when Creator.searchIndexable is true. -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />

    <!-- Open Graph / Twitter Card defaults. App.tsx overrides these at runtime with
         the live creator config. These fallbacks are what social-preview crawlers
         (Slack, iMessage, etc.) see before any JS runs.
         IMPORTANT: keep this lifestyle-creator neutral. No "premium", "members",
         "vault", "exclusive", "private". Anything monetization-adjacent lives on
         the members.* subdomain only. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cristina Adam — NYC Lifestyle" />
    <meta property="og:description" content="NYC lifestyle, travel, fashion, creative work — daily moments from Cristina." />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>client</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
